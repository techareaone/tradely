<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradely</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#e5e5e5;
  overflow-x:hidden;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image: linear-gradient(rgba(255,255,255,0.04) 4px, transparent 4px),
                    linear-gradient(90deg, rgba(255,255,255,0.04) 4px, transparent 4px);
  background-size: 60px 60px;
  z-index:0;
}

/* HERO + TILES */
.tile{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  position:relative;
  z-index:1;
}

.logo{
  width:90%;
  height:50%;
  margin-bottom:40px;
  position:relative;
}

.logo img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

.outline{opacity:0;animation:fadeIn .5s forwards}
.filled{clip-path: inset(0 100% 0 0);animation:reveal 2s ease forwards .5s}

@keyframes fadeIn{to{opacity:1}}
@keyframes reveal{to{clip-path: inset(0 0 0 0)}}

h1{
  font-size: clamp(2.5rem,5vw,4rem);
  font-weight:800;
  margin-bottom:15px;
}

p{
  max-width:600px;
  color:#aaa;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 26px;
  border:1px solid #333;
  background:#111;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
  border-color:#555;
}
</style>
</head>

<body>

<!-- ORIGINAL HERO -->
<section class="tile">
  <div class="logo">
    <img src="outline.svg" class="outline">
    <img src="filled.svg" class="filled">
  </div>

  <p>By traders, for traders.</p>

  <div class="buttons">
    <a href="https://github.com/techareaone/tradely" class="btn">GitHub</a>
    <a href="https://discord.tradely.dev" class="btn">Discord</a>
  </div>
</section>

<!-- PROJECT TILES WILL BE INJECTED HERE -->
<div id="tiles"></div>

<script>
async function loadProjects(){
  const res = await fetch("https://doc.tradely.dev/README.md");
  const text = await res.text();

  const section = text.split("## Projects Undertaken by Tradely")[1];
  if(!section) return;

  const lines = section.split("\n").map(l=>l.trim()).filter(Boolean);

  let projects = [];
  let currentColors = {
    bg: "#000",
    text: "#e5e5e5"
  };

  lines.forEach(line => {

    // COLOR LINE
    if(line.startsWith("[ColorBg:")){
      const bgMatch = line.match(/ColorBg:(#[0-9A-Fa-f]{6})/);
      const textMatch = line.match(/ColorText:(#[0-9A-Fa-f]{6})/);

      if(bgMatch) currentColors.bg = bgMatch[1];
      if(textMatch) currentColors.text = textMatch[1];

      return;
    }

    // PROJECT LINE
    if(line.startsWith("[")){
      const name = line.match(/\[(.*?)\]/)?.[1];
      const links = [...line.matchAll(/\((.*?)\)/g)];

      const mainLink = links[0]?.[1] || "#";
      const downloadLink = links[1]?.[1] || null;

      const descMatch = line.split("Desc:")[1];
      const desc = descMatch ? descMatch.trim() : "";

      projects.push({
        name,
        link: mainLink,
        download: downloadLink,
        desc,
        colors: {...currentColors}
      });
    }

  });

  renderTiles(projects);
}

function renderTiles(projects){
  const container = document.getElementById("tiles");

  projects.forEach(p => {
    const tile = document.createElement("section");
    tile.className = "tile";

    tile.style.background = p.colors.bg;
    tile.style.color = p.colors.text;

    tile.innerHTML = `
      <h1>${p.name}</h1>
      <p>${p.desc}</p>

      <div class="buttons">
        <a href="${p.link}" class="btn" target="_blank">View</a>
        ${p.download ? `<a href="${p.download}" class="btn" target="_blank">Download</a>` : ""}
      </div>
    `;

    container.appendChild(tile);
  });
}

loadProjects();
</script>

</body>
</html>
